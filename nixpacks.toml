[phases.setup]
nixPkgs = ['nodejs_18', 'openssl']
cmds = [
  'npm install -g pnpm@10.34.5',
  'npm install -g prisma'
]

[phases.install]
cmds = [
  'npx pnpm install --no-frozen-lockfile',
  'mkdir -p prisma',
  'touch prisma/dev.db',
  'chmod -R 777 prisma'
]

[phases.build]
cmds = [
  'mkdir -p node_modules/.prisma',
  'mkdir -p .next',
  'chmod -R 777 node_modules/.prisma node_modules/.bin .next prisma',
  'DATABASE_URL=file:./db/database.sqlite npx prisma generate',
  'DATABASE_URL=file:./db/database.sqlite npx prisma db push --accept-data-loss',
  'DATABASE_URL=file:./db/database.sqlite npx pnpm run build'
]

[start]
cmd = 'DATABASE_URL=file:./db/database.sqlite npx pnpm start'

[phases.setup.env]
NODE_ENV = "production"
PRISMA_SKIP_POSTINSTALL_GENERATE = "true"
PRISMA_GENERATE_SKIP_DUPLICATE = "true"
DATABASE_URL = "file:./db/database.sqlite"