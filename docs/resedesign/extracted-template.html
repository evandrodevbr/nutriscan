  <style>
/* ============================================================
   NutriScan — Revamped Design System
   Editorial, trustworthy, health-focused
   ============================================================ */

/* Tokens */
:root {
  /* Warm neutrals — stone-tinted */
  --ink-900: #141312;
  --ink-800: #26231f;
  --ink-700: #3d3934;
  --ink-600: #595149;
  --ink-500: #7a7269;
  --ink-400: #a39c93;
  --ink-300: #c9c3ba;
  --ink-200: #e4dfd7;
  --ink-150: #ece7de;
  --ink-100: #f3efe7;
  --ink-50:  #f9f6f0;
  --ink-0:   #fdfbf5;

  /* Accent — clinical green (health, trustworthy, muted) */
  --accent:         oklch(52% 0.11 155);
  --accent-hover:   oklch(46% 0.11 155);
  --accent-soft:    oklch(94% 0.04 155);
  --accent-ink:     oklch(28% 0.06 155);

  /* Nutri-Score — keep official palette (regulated meaning) */
  --nutri-a: #038141;
  --nutri-b: #85bb2f;
  --nutri-c: #fecb02;
  --nutri-d: #ee8100;
  --nutri-e: #e63e11;

  /* Semantic */
  --warn:   #b45309;
  --warn-soft: #fef3c7;
  --danger: #b91c1c;

  /* Radii */
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 16px;
  --r-xl: 24px;

  /* Type */
  --font-serif: 'Instrument Serif', 'Iowan Old Style', Georgia, serif;
  --font-sans:  'Inter', system-ui, -apple-system, sans-serif;
  --font-mono:  'JetBrains Mono', ui-monospace, Menlo, monospace;
}

.theme-dark {
  --ink-900: #f3efe7;
  --ink-800: #e4dfd7;
  --ink-700: #c9c3ba;
  --ink-600: #a39c93;
  --ink-500: #7a7269;
  --ink-400: #595149;
  --ink-300: #3d3934;
  --ink-200: #2a2622;
  --ink-150: #22201d;
  --ink-100: #1c1a17;
  --ink-50:  #161412;
  --ink-0:   #0f0e0c;

  --accent:      oklch(68% 0.12 155);
  --accent-hover: oklch(74% 0.12 155);
  --accent-soft: oklch(28% 0.05 155);
  --accent-ink:  oklch(88% 0.06 155);
}

/* Reset-ish */
* { box-sizing: border-box; }
body, h1, h2, h3, h4, h5, p, ul, ol, figure, blockquote {
  margin: 0;
}
ul, ol { padding-left: 0; list-style: none; }
button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
img, svg { display: block; }
a { color: inherit; text-decoration: none; }

body {
  font-family: var(--font-sans);
  font-feature-settings: 'ss01', 'cv11';
  color: var(--ink-900);
  background: var(--ink-0);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  line-height: 1.5;
}

/* ============================================================
   Type scale — editorial
   ============================================================ */
.display {
  font-family: var(--font-serif);
  font-weight: 400;
  letter-spacing: -0.015em;
  line-height: 1.02;
  font-size: clamp(44px, 7vw, 96px);
}
.display-sm {
  font-family: var(--font-serif);
  font-weight: 400;
  letter-spacing: -0.01em;
  line-height: 1.04;
  font-size: clamp(32px, 4vw, 52px);
}
.eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-500);
  font-weight: 500;
}
.label-sm {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-500);
  font-weight: 500;
}

/* ============================================================
   Nutri-Score scale badge — official style, simplified
   ============================================================ */
.nutri-badge {
  display: inline-flex;
  align-items: center;
  font-family: var(--font-sans);
  font-weight: 800;
  border-radius: 999px;
  overflow: hidden;
  background: var(--ink-100);
  padding: 3px;
  gap: 2px;
}
.nutri-badge .seg {
  width: 26px; height: 26px;
  border-radius: 999px;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-size: 12px;
  letter-spacing: -0.02em;
  transition: transform 0.25s;
  opacity: 0.35;
  filter: saturate(0.3);
}
.nutri-badge .seg.active {
  opacity: 1; filter: none;
  transform: scale(1.15);
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.nutri-badge .seg.a { background: var(--nutri-a); }
.nutri-badge .seg.b { background: var(--nutri-b); }
.nutri-badge .seg.c { background: var(--nutri-c); color: #3a2a00; }
.nutri-badge .seg.d { background: var(--nutri-d); }
.nutri-badge .seg.e { background: var(--nutri-e); }

.nutri-badge.lg .seg { width: 40px; height: 40px; font-size: 17px; }
.nutri-badge.sm .seg { width: 18px; height: 18px; font-size: 9px; }

/* Single big letter style — for hero metric */
.nutri-letter {
  width: 88px; height: 88px;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--font-serif);
  font-size: 58px;
  color: #fff;
  font-weight: 400;
  letter-spacing: -0.03em;
  line-height: 1;
  position: relative;
  box-shadow: inset 0 -3px 0 rgba(0,0,0,0.15), 0 8px 24px -8px rgba(0,0,0,0.2);
}
.nutri-letter.a { background: var(--nutri-a); }
.nutri-letter.b { background: var(--nutri-b); }
.nutri-letter.c { background: var(--nutri-c); color: #3a2a00; }
.nutri-letter.d { background: var(--nutri-d); }
.nutri-letter.e { background: var(--nutri-e); }

/* ============================================================
   Button system
   ============================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: 14px;
  line-height: 1;
  padding: 12px 18px;
  border-radius: var(--r-md);
  transition: all 0.2s;
  cursor: pointer;
  border: 1px solid transparent;
  white-space: nowrap;
}
.btn-primary {
  background: var(--ink-900);
  color: var(--ink-0);
}
.btn-primary:hover { background: var(--ink-800); transform: translateY(-1px); }
.btn-accent {
  background: var(--accent);
  color: #fff;
}
.btn-accent:hover { background: var(--accent-hover); }
.btn-ghost {
  background: transparent;
  color: var(--ink-900);
  border: 1px solid var(--ink-200);
}
.btn-ghost:hover { border-color: var(--ink-400); background: var(--ink-50); }
.btn-sm { padding: 8px 12px; font-size: 13px; }
.btn-lg { padding: 16px 24px; font-size: 15px; }

/* ============================================================
   Chip / tag
   ============================================================ */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 500;
  background: var(--ink-100);
  color: var(--ink-700);
  border: 1px solid var(--ink-200);
}
.chip.warn {
  background: var(--warn-soft);
  color: var(--warn);
  border-color: #fcd34d;
}
.chip.accent {
  background: var(--accent-soft);
  color: var(--accent-ink);
  border-color: transparent;
}

/* ============================================================
   Input
   ============================================================ */
.input {
  width: 100%;
  padding: 14px 18px;
  border-radius: var(--r-md);
  border: 1px solid var(--ink-200);
  background: var(--ink-0);
  font-family: var(--font-sans);
  font-size: 15px;
  color: var(--ink-900);
  transition: all 0.15s;
}
.input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-soft);
}
.input::placeholder { color: var(--ink-400); }

/* ============================================================
   Utilities
   ============================================================ */
.hairline { border-bottom: 1px solid var(--ink-200); }
.hairline-t { border-top: 1px solid var(--ink-200); }
.container { max-width: 1200px; margin: 0 auto; padding: 0 32px; }

/* Custom scrollbar — thin, warm */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--ink-200); border-radius: 10px; border: 2px solid var(--ink-0); }
::-webkit-scrollbar-thumb:hover { background: var(--ink-300); }

/* Comparison frame */
.compare-frame {
  border-radius: 20px;
  overflow: hidden;
  background: var(--ink-0);
  box-shadow: 0 1px 3px rgba(20,19,18,0.04), 0 20px 60px -20px rgba(20,19,18,0.12);
  border: 1px solid var(--ink-200);
}
.compare-label {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--ink-500);
  padding: 10px 16px;
  border-bottom: 1px solid var(--ink-200);
  background: var(--ink-50);
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 500;
}
.compare-label::before {
  content: "";
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--ink-400);
}
.compare-label.new::before { background: var(--accent); }

/* Fade in on scroll */
.fade-in {
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.fade-in.visible { opacity: 1; transform: none; }

/* Icon size helpers */
.i-14 { width: 14px; height: 14px; }
.i-16 { width: 16px; height: 16px; }
.i-18 { width: 18px; height: 18px; }
.i-20 { width: 20px; height: 20px; }
.i-24 { width: 24px; height: 24px; }

// Nutri-Score scale badge — all 5 letters with active one highlighted
function NutriScale({ active, size = "md" }) {
  const cls = `nutri-badge ${size === "sm" ? "sm" : size === "lg" ? "lg" : ""}`;
  return (
    <div className={cls}>
      {["a","b","c","d","e"].map(l => (
        <div key={l} className={`seg ${l} ${active === l ? "active" : ""}`}>{l.toUpperCase()}</div>
      ))}
    </div>
  );
}

// Single big Nutri-Score letter — hero metric
function NutriLetter({ grade, size = 88 }) {
  return (
    <div
      className={`nutri-letter ${grade}`}
      style={{ width: size, height: size, fontSize: Math.round(size * 0.66) }}
    >
      {grade.toUpperCase()}
    </div>
  );
}

// NOVA group pill
function NovaPill({ group }) {
  const labels = { 1: "Não processado", 2: "Ingrediente culinário", 3: "Processado", 4: "Ultraprocessado" };
  const colors = { 1: "var(--nutri-a)", 2: "var(--nutri-c)", 3: "var(--nutri-d)", 4: "var(--nutri-e)" };
  return (
    <div style={{
      display: "inline-flex", alignItems: "center", gap: 8,
      padding: "4px 10px 4px 4px",
      borderRadius: 999,
      background: "var(--ink-100)",
      border: "1px solid var(--ink-200)",
      fontSize: 12,
      color: "var(--ink-700)",
    }}>
      <span style={{
        width: 22, height: 22, borderRadius: 999,
        background: colors[group],
        color: group === 2 ? "#3a2a00" : "#fff",
        display: "grid", placeItems: "center",
        fontFamily: "var(--font-mono)", fontWeight: 700, fontSize: 11,
      }}>{group}</span>
      NOVA · {labels[group]}
    </div>
  );
}

// Verdict dot
function VerdictTag({ verdict }) {
  const map = {
    recommended: { label: "Recomendado", color: "var(--nutri-a)" },
    moderate:    { label: "Com moderação", color: "var(--nutri-c)", ink: "#3a2a00" },

              display: 'flex', alignItems: 'flex-start', gap: 14,

              <Icon.Alert className="i-20" style={{ color: 'var(--warn)', flexShrink: 0, marginTop: 1 }}/>
              <div>
                <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--warn)', marginBottom: 4 }}>
                  Contém alérgenos
                </div>
                <div style={{ fontSize: 14, color: '#78350f' }}>
                  {product.allergens.map(a => ({ gluten: 'Glúten', milk: 'Leite', soy: 'Soja', nuts: 'Oleaginosas', eggs: 'Ovos', peanuts: 'Amendoim' }[a] || a)).join(' · ')}
                </div>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Nutriments section */}
      <div style={{ padding: '32px 40px 60px', borderTop: '1px solid var(--ink-200)' }}>
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 20 }}>
          <h3 className="display-sm" style={{ fontSize: 28 }}>Composição nutricional</h3>
          <div className="label-sm">por 100g · %VD de referência</div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '8px 48px' }}>
          {[
            { k: 'energy',  l: 'Energia',   u: 'kcal' },
            { k: 'fat',     l: 'Gorduras totais', u: 'g' },
            { k: 'sat_fat', l: 'Gorduras saturadas', u: 'g' },
            { k: 'sugars',  l: 'Açúcares',  u: 'g' },
            { k: 'salt',    l: 'Sódio',     u: 'g' },
            { k: 'fiber',   l: 'Fibras',    u: 'g' },
            { k: 'proteins',l: 'Proteínas', u: 'g' },
          ].map(row => {
            const pct = bar(row.k);
            const v = product.nutriments[row.k];
            const high = pct > 40 && ['fat','sat_fat','sugars','salt'].includes(row.k);
            const good = ['fiber','proteins'].includes(row.k);
            return (
              <div key={row.k} style={{ padding: '14px 0', borderBottom: '1px solid var(--ink-200)' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 8 }}>
                  <span style={{ fontSize: 14, color: 'var(--ink-800)' }}>{row.l}</span>
                  <span style={{ fontFamily: 'var(--font-serif)', fontSize: 18, color: 'var(--ink-900)' }}>
                    {v}<span style={{ fontSize: 12, color: 'var(--ink-500)', marginLeft: 3, fontFamily: 'var(--font-mono)' }}>{row.u}</span>
                  </span>
                </div>
                <div style={{ height: 4, background: 'var(--ink-100)', borderRadius: 999, overflow: 'hidden', position: 'relative' }}>
                  <div style={{
                    width: `${pct}%`, height: '100%',
                    background: high ? 'var(--nutri-e)' : good ? 'var(--accent)' : 'var(--ink-500)',
                    transition: 'width 0.6s',
                  }}/>
                </div>
                <div style={{ fontSize: 11, color: 'var(--ink-500)', marginTop: 4, fontFamily: 'var(--font-mono)', letterSpacing: '0.04em' }}>
                  {pct}% VD
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Footer */}
      <div style={{ padding: '28px 40px', background: 'var(--ink-50)', borderTop: '1px solid var(--ink-200)' }}>
        <div style={{ fontSize: 12, color: 'var(--ink-500)', lineHeight: 1.6, maxWidth: 700 }}>
          Dados fornecidos pela comunidade Open Food Facts sob licença ODbL.
          Última atualização: há 3 dias · fonte: contribuidor verificado.
        </div>
      </div>
    </div>
  );
}

Object.assign(window, {
  AfterProductCardCompact, AfterProductCardExpanded,
  DensityToggle, AfterResultsPage, AfterProductDetail,
});

</script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const SECTIONS = [

  { id: 'features',   label: 'Features' },
  { id: 'detail',     label: 'Produto' },
  { id: 'results',    label: 'Resultados' },
  { id: 'donation',   label: 'Doação' },
];

function Frame({ label, children, kind, tall }) {
  return (
    <div className="compare-frame" style={{ display: 'flex', flexDirection: 'column' }}>
      <div className={`compare-label ${kind === 'new' ? 'new' : ''}`}>
        {kind === 'new' ? 'Depois · Proposta' : 'Antes · Atual em produção'}

      <div className={`frame-body${tall ? ' tall' : ''}`}>
        {children}
      </div>
    </div>
  );
}

function Rationale({ items }) {
  return (
    <div className="rationale">
      {items.map((it, i) => (
        <div key={i}>
          <span className="tag">{it.tag}</span>
          <h4>{it.title}</h4>
          <p>{it.desc}</p>
        </div>

  );
}

  useEffect(() => {
    document.documentElement.className = theme === 'dark' ? 'theme-dark' : '';
    localStorage.setItem('nsc-theme', theme);
  }, [theme]);

  return (

          <div className="tabs">
            {SECTIONS.map(s => (

            {theme === 'dark' ? <Icon.Sun className="i-14"/> : <Icon.Moon className="i-14"/>}
            {theme === 'dark' ? 'Light' : 'Dark'}
          </button>
        </div>
      </header>

      {section === 'hero' && (
        <>
          <div className="section-title">Hero <small>Landing · página inicial</small></div>
          <Rationale items={[
            { tag: 'Tipografia', title: 'Serif editorial no headline', desc: 'Instrument Serif sinaliza confiança e leitura — em vez de tech-bravado. Peso 400 + itálico para acento.' },
            { tag: 'Tom',        title: 'Linguagem direta, humana',    desc: '"Entenda o que há dentro" substitui "Descriptografamos rótulos para decisões soberanas". Menos jargão, mais clareza.' },
            { tag: 'Cor',        title: 'Um único accent, bem usado', desc: 'Verde clínico oklch(52% 0.11 155) no elemento mais importante. Gradientes e badges tech removidos.' },
          ]}/>

            { tag: 'Fluxo',       title: 'Passos com linha conectora',     desc: 'Números serifados em círculos outline guiam o olho. Sem "STEP_01" techy.' },
          ]}/>
          <div className="grid-2">
            <Frame kind="old" tall>
              <BeforeFeatures/>
            </Frame>
            <Frame kind="new" tall>
              <AfterFeatures/>
              <AfterHowItWorks/>
            </Frame>
          </div>
        </>

      {section === 'detail' && (
        <>
          <div className="section-title">Página de produto <small>superfície mais crítica</small></div>
          <Rationale items={[
            { tag: 'Métrica-herói', title: 'Nutri-Score dominante', desc: 'Letra grande (92px) num círculo oficial da cor correspondente, com a escala A–E completa logo abaixo para contexto.' },
            { tag: 'Clareza',      title: 'Composição com barras VD', desc: 'Cada nutriente recebe uma barra proporcional ao % do valor diário de referência, com verde/vermelho semânticos.' },

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
